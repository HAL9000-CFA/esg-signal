x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "change-me-in-production"
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./pipeline:/opt/airflow/dags # DAG files
    - ./agents:/opt/airflow/src/agents # importable from DAGs
    - ./data:/opt/airflow/data # shared data volume
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

servives:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRESS_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install -r /opt/airflow/src/requirements.txt --quiet &&
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname ESG
          --lastname Signal
          --role Admin
          --email admin@example.com
      "
    volumes:
      - ./pipeline:/opt/airflow/dags
      - ./agents:/opt/airflow/src/agents
      - ./data:/opt/airflow/data
      - ./requirements.txt:/opt/airflow/src/requirements.txt
      - airflow-logs:/opt/airflow/logs
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports: -m "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./ui:/app/ui
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-logs:
